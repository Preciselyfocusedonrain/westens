<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Westens</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #1e1e1e;
      background: #0d0d0d;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #f0a500;
      letter-spacing: 2px;
      text-decoration: none;
    }

    .center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .card h2 {
      font-size: 26px;
      margin-bottom: 8px;
      color: #fff;
    }

    .card p {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: #f0a500; }

    .btn {
      width: 100%;
      padding: 14px;
      background: #f0a500;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
    }

    .btn:hover { background: #d4920a; }

    .bottom-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }

    .bottom-link a { color: #f0a500; text-decoration: none; }

    .error-msg {
      background: #2a1010;
      border: 1px solid #e74c3c;
      color: #e74c3c;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .success-msg {
      background: #0a2a0a;
      border: 1px solid #2ecc71;
      color: #2ecc71;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .free-badge {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #888;
    }

    .free-badge span { color: #f0a500; font-weight: 600; }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">WESTENS</a>
  </nav>

  <div class="center">
    <div class="card">
      <h2>Create your account</h2>
      <p>Start analyzing stocks for free today</p>

      <div class="free-badge">
        ✓ <span>Free plan includes</span> 5 searches/day + DCF + Financial Statements
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe" />
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" onkeypress="handleKey(event)" />
      </div>

      <button class="btn" onclick="register()">Create Free Account</button>

      <div class="bottom-link">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script>
    function handleKey(e) {
      if (e.key === 'Enter') register()
    }

    async function register() {
      const name = document.getElementById('name').value.trim()
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value.trim()
      const errorMsg = document.getElementById('errorMsg')
      const successMsg = document.getElementById('successMsg')

      errorMsg.style.display = 'none'
      successMsg.style.display = 'none'

      if (!name || !email || !password) {
        errorMsg.textContent = 'Please fill in all fields'
        errorMsg.style.display = 'block'
        return
      }

      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters'
        errorMsg.style.display = 'block'
        return
      }

      try {
        const response = await fetch('http://localhost:3000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        })

        const data = await response.json()

        if (data.success) {
          localStorage.setItem('westens_token', data.token)
          localStorage.setItem('westens_user', JSON.stringify(data.user))
          successMsg.textContent = 'Account created! Redirecting...'
          successMsg.style.display = 'block'
          setTimeout(() => {
            window.location.href = '/'
          }, 1000)
        } else {
          errorMsg.textContent = data.message
          errorMsg.style.display = 'block'
        }
      } catch (error) {
        errorMsg.textContent = 'Server error. Please try again.'
        errorMsg.style.display = 'block'
      }
    }
  </script>

</body>
</html>
